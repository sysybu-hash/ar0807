<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>דוגמאות עיצוב — דף הבית</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 1.5rem; line-height: 1.5; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    p.intro { color: #94a3b8; margin: 0 0 1.5rem; font-size: 0.95rem; }
    .grid { display: grid; gap: 1.5rem; max-width: 1600px; margin: 0 auto; }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    figure { margin: 0; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
    figcaption { padding: 0.75rem 1rem; font-weight: 700; font-size: 0.9rem; border-bottom: 1px solid #334155; }
    figcaption span { display: block; font-weight: 400; font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem; }
    img { width: 100%; height: auto; display: block; vertical-align: middle; }
    a.back { color: #c9a84c; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back" href="/">← חזרה לאתר</a>
  <h1>שלוש דוגמאות לעיצוב מלא של דף הבית</h1>
  <p class="intro">השוו בין האפשרויות ובחרו איזה כיוון מתאים — אפשר לממש בעמוד האמיתי אחרי הבחירה.</p>
  <div class="grid">
    <figure>
      <figcaption>אפשרות א׳ — יוקה כהה<span>Hero מלא רוחב, זהב וכחול כהה, כרטיסי שירות וגלריה</span></figcaption>
      <a href="option-a-dark-luxury.png" target="_blank" rel="noopener"><img src="option-a-dark-luxury.png" alt="דוגמה א׳ עיצוב כהה יוקתי" loading="lazy" /></a>
    </figure>
    <figure>
      <figcaption>אפשרות ב׳ — מינימליסטי בהיר<span>הרבה לבן, מרווח, קווים דקים וכפתורי CTA שקטים</span></figcaption>
      <a href="option-b-light-minimal.png" target="_blank" rel="noopener"><img src="option-b-light-minimal.png" alt="דוגמה ב׳ עיצוב בהיר מינימלי" loading="lazy" /></a>
    </figure>
    <figure>
      <figcaption>אפשרות ג׳ — מגזיני ונועז<span>Hero אסימטרי, רשת bento, טיפוגרפיה חזקה</span></figcaption>
      <a href="option-c-editorial-bold.png" target="_blank" rel="noopener"><img src="option-c-editorial-bold.png" alt="דוגמה ג׳ עיצוב מגזיני" loading="lazy" /></a>
    </figure>
  </div>
</body>
</html>
