<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>אישורי בודק חשמל</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<style>
body{font-family:system-ui,sans-serif;background:#eef2f7;}
canvas.sig{border:1px dashed #94a3b8;border-radius:8px;cursor:crosshair;background:#f8fafc;}
.tab-active{border-bottom:3px solid #1d4ed8;color:#1d4ed8;font-weight:700;}
@media print{.no-print{display:none!important;}}
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden no-print">
<header class="bg-gradient-to-l from-blue-700 to-blue-600 p-6 text-white text-center">
<h1 class="text-2xl md:text-3xl font-bold">תוכנת אישורים לבודק חשמל</h1>
<p class="text-blue-100 text-sm mt-1">קובץ HTML אחד · localStorage · הדפסה / PDF</p>
</header>
<div class="flex flex-wrap border-b bg-slate-50">
<button type="button" class="tab py-3 flex-1 min-w-[120px] tab-active" data-t="form">טופס אישור</button>
<button type="button" class="tab py-3 flex-1 min-w-[120px]" data-t="list">רשימת אישורים</button>
<button type="button" class="tab py-3 flex-1 min-w-[120px]" data-t="settings">הגדרות בודק</button>
</div>
<div id="p-form" class="p-6 md:p-8 space-y-8">
<input type="hidden" id="edit_id" value="" />
<section>
<h2 class="text-lg font-bold text-blue-900 border-b pb-2 mb-4">פרטי המתקן</h2>
<div class="grid md:grid-cols-2 gap-4">
<div><label class="block text-sm font-semibold mb-1">שם המתקן <span class="text-red-600">*</span></label><input id="facility_name" class="w-full border rounded-lg px-3 py-2" /></div>
<div><label class="block text-sm font-semibold mb-1">כתובת</label><input id="address" class="w-full border rounded-lg px-3 py-2" /></div>
<div><label class="block text-sm font-semibold mb-1">גודל חיבור</label><input id="connection_size" class="w-full border rounded-lg px-3 py-2" /></div>
<div><label class="block text-sm font-semibold mb-1">ערך הארקה</label><input id="grounding_value" class="w-full border rounded-lg px-3 py-2" /></div>
<div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">בידוד</label><input id="insulation" class="w-full border rounded-lg px-3 py-2" /></div>
<div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">הערות</label><textarea id="notes" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea></div>
</div>
</section>
<section>
<h2 class="text-lg font-bold text-blue-900 border-b pb-2 mb-4">תמונות מהשטח</h2>
<input type="file" id="photo_input" accept="image/*" multiple class="block w-full text-sm" />
<div id="photo_previews" class="flex flex-wrap gap-3 mt-4"></div>
</section>
<section>
<h2 class="text-lg font-bold text-blue-900 border-b pb-2 mb-4">חתימת הבודק</h2>
<div class="relative max-w-xl">
<canvas id="signature-pad" class="sig w-full h-40"></canvas>
<button type="button" id="clear_sig" class="absolute top-2 left-2 text-xs bg-red-50 text-red-700 px-2 py-1 rounded border">נקה חתימה</button>
</div>
</section>
<details class="border rounded-lg p-4 bg-slate-50">
<summary class="font-semibold cursor-pointer">שדות נוספים (אופציונלי)</summary>
<div class="grid md:grid-cols-2 gap-4 mt-4 text-sm">
<div><label class="block mb-1">מזמין / לקוח</label><input id="ex_client" class="w-full border rounded px-2 py-1" /></div>
<div><label class="block mb-1">סוג בדיקה</label><input id="ex_inspection_type" class="w-full border rounded px-2 py-1" /></div>
<div><label class="block mb-1">מתח (V)</label><input id="ex_voltage" class="w-full border rounded px-2 py-1" /></div>
<div><label class="block mb-1">שיטת הגנה</label><input id="ex_earthing_system" class="w-full border rounded px-2 py-1" /></div>
<div><label class="block mb-1">מכשיר בדיקה</label><input id="ex_tester" class="w-full border rounded px-2 py-1" /></div>
<div><label class="block mb-1">לולאת תקלה Ph-E</label><input id="ex_fault_loop" class="w-full border rounded px-2 py-1" /></div>
</div>
</details>
<div class="flex flex-wrap gap-3">
<button type="button" id="btn_save" class="flex-1 min-w-[200px] bg-emerald-600 text-white font-bold py-3 rounded-lg">שמור</button>
<button type="button" id="btn_print" class="flex-1 min-w-[200px] bg-blue-600 text-white font-bold py-3 rounded-lg">הדפסה / PDF</button>
<button type="button" id="btn_new" class="bg-slate-200 font-semibold py-3 px-6 rounded-lg">טופס חדש</button>
</div>
<p id="form_message" class="text-sm text-center min-h-[1.25rem]"></p>
</div>
<div id="p-list" class="p-6 md:p-8 hidden">
<h2 class="text-xl font-bold text-blue-900 mb-4">כל האישורים</h2>
<div class="overflow-x-auto border rounded-lg">
<table class="w-full text-sm text-right"><thead class="bg-slate-100 border-b"><tr>
<th class="p-3">עודכן</th><th class="p-3">שם מתקן</th><th class="p-3">כתובת</th><th class="p-3">פעולות</th>
</tr></thead><tbody id="cert_table"></tbody></table>
</div>
<p id="list_empty" class="text-center text-slate-500 py-8 hidden">אין רשומות.</p>
</div>
<div id="p-settings" class="p-6 md:p-8 hidden space-y-6">
<h2 class="text-xl font-bold text-blue-900">פרטי הבודק</h2>
<div class="grid md:grid-cols-2 gap-4">
<div><label class="block text-sm font-semibold mb-1">שם מלא</label><input id="set_name" class="w-full border rounded-lg px-3 py-2" /></div>
<div><label class="block text-sm font-semibold mb-1">מספר רישיון</label><input id="set_license" class="w-full border rounded-lg px-3 py-2" /></div>
<div><label class="block text-sm font-semibold mb-1">טלפון</label><input id="set_phone" class="w-full border rounded-lg px-3 py-2" /></div>
<div><label class="block text-sm font-semibold mb-1">דוא"ל</label><input id="set_email" class="w-full border rounded-lg px-3 py-2" /></div>
</div>
<div class="grid md:grid-cols-2 gap-6">
<div class="border rounded-lg p-4 bg-slate-50">
<label class="font-semibold block mb-2">לוגו</label>
<input type="file" id="set_logo" accept="image/*" class="text-sm w-full" />
<div class="mt-3 h-28 flex items-center justify-center bg-white border rounded overflow-hidden">
<img id="logo_preview" class="max-h-full max-w-full object-contain hidden" alt="" /><span id="logo_placeholder" class="text-slate-400 text-sm">אין לוגו</span></div>
<button type="button" id="clear_logo" class="text-sm text-red-600 mt-2">הסר לוגו</button>
</div>
<div class="border rounded-lg p-4 bg-slate-50">
<label class="font-semibold block mb-2">חותמת גומי</label>
<input type="file" id="set_stamp" accept="image/*" class="text-sm w-full" />
<div class="mt-3 h-28 flex items-center justify-center bg-white border rounded overflow-hidden">
<img id="stamp_preview" class="max-h-full max-w-full object-contain hidden" alt="" /><span id="stamp_placeholder" class="text-slate-400 text-sm">אין חותמת</span></div>
<button type="button" id="clear_stamp" class="text-sm text-red-600 mt-2">הסר חותמת</button>
</div>
</div>
<button type="button" id="save_settings" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">שמור הגדרות</button>
<p id="settings_message" class="text-sm text-center"></p>
</div>
</div>
<p class="no-print text-center text-xs text-slate-500 mt-4">נתונים בדפדפן זה בלבד (localStorage).</p>
<script src="inspector-standalone.js"></script>
</body>
</html>
